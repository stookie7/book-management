version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21

  build:
    commands:
      - cd backend && chmod +x gradlew && ./gradlew bootJar -x test

  post_build:
    commands:
      - cd ..
      - mkdir -p deploy-backend
      - cp backend/build/libs/book-management-0.0.1-SNAPSHOT.jar deploy-backend/
      - echo "web: java -jar book-management-0.0.1-SNAPSHOT.jar" > deploy-backend/Procfile
      - '[ -d backend/.ebextensions ] && cp -r backend/.ebextensions deploy-backend/ || true'
      - ls -la deploy-backend/

artifacts:
  files:
    - '**/*'
  base-directory: deploy-backend
  discard-paths: no